version: 1
project:
  name: Codex Bootstrap Protocol
  status: active
  summary: >-
    Codex-native Bootstrap Protocol scaffold for initializing or retrofitting
    projects with AGENTS.md, repo-scoped skills, Codex config surfaces, durable
    docs, and Beads task tracking.
active_work: []
decisions:
  - date: 2026-06-07
    summary: >-
      Minion is now dual-mode: report-only for analysis and guarded execution
      for explicit implementation requests. Fanout defaults to 6 workers and
      is hard-capped at 6; execution workers require disjoint write scopes and
      steering-session Beads, verification, commit, and push coordination.
  - date: 2026-06-07
    summary: >-
      The global minion skill and global worker agent TOML on this machine were
      synced from the repository copies after the executable minion update.
  - date: 2026-06-07
    summary: >-
      Bootstrap now accepts explicit --interactive and --non-interactive modes;
      CI and non-TTY invocations remain no-prompt non-interactive paths.
  - date: 2026-06-07
    summary: >-
      Converted the approved interactive bootstrap wizard plan into Beads:
      E05 plus execution-ready T013-T018. T019 remained skipped because it is
      HITL and non-execution-ready.
  - date: 2026-06-07
    summary: >-
      Updated the approved project plan with E05 and tasks T013-T019 for the
      interactive bootstrap wizard, keeping T019 as HITL/non-execution-ready
      optional scope.
  - date: 2026-06-07
    summary: >-
      Updated the approved Codex Bootstrap Protocol PRD with interactive
      bootstrap wizard requirements sourced from
      docs/decision-brief-bootstrap-interactive-wizard.md.
  - date: 2026-06-07
    summary: >-
      Initialize root project state docs using the scaffold's version 1
      handoff/changelog schemas instead of inventing a richer incompatible
      format.
  - date: 2026-06-07
    summary: >-
      Use normal Git for repository sync; do not require or run bd dolt
      push/pull in this repository.
